name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  actionlint:
    name: Lint workflows
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Run actionlint
        uses: rhysd/actionlint@v1.7.11

  commitlint:
    name: Lint commit messages
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Lint pull request commits
        uses: wagoid/commitlint-github-action@v6
        with:
          configFile: commitlint.config.cjs

  validate:
    name: Validate (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node:
          - "20"
          - "22"

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Run tests
        run: npm test

      - name: Build package
        run: npm run build

      - name: Validate npm package contents
        run: npm run pack:check

  ci-required:
    name: CI required
    runs-on: ubuntu-latest
    needs:
      - actionlint
      - commitlint
      - validate
    if: ${{ always() }}

    steps:
      - name: Fail if any required CI job failed
        run: |
          if [ "${{ needs.actionlint.result }}" != "success" ]; then
            echo "actionlint result: ${{ needs.actionlint.result }}"
            exit 1
          fi

          if [ "${{ needs.validate.result }}" != "success" ]; then
            echo "validate result: ${{ needs.validate.result }}"
            exit 1
          fi

          if [ "${{ needs.commitlint.result }}" != "success" ] && [ "${{ needs.commitlint.result }}" != "skipped" ]; then
            echo "commitlint result: ${{ needs.commitlint.result }}"
            exit 1
          fi
