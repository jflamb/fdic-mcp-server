name: Deploy Cloud Run

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-cloud-run-production
  cancel-in-progress: false

env:
  GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  GCP_REGION: ${{ vars.GCP_REGION }}
  GAR_REPOSITORY: ${{ vars.GAR_REPOSITORY }}
  GAR_IMAGE: ${{ vars.GAR_IMAGE }}
  CLOUD_RUN_SERVICE: ${{ vars.CLOUD_RUN_SERVICE }}
  GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
  GCP_SERVICE_ACCOUNT: ${{ vars.GCP_SERVICE_ACCOUNT }}
  CLOUD_RUN_RUNTIME_SERVICE_ACCOUNT: ${{ vars.CLOUD_RUN_RUNTIME_SERVICE_ACCOUNT }}
  PUBLIC_MCP_URL: https://bankfind.jflamb.com/mcp
  PUBLIC_HEALTH_URL: https://bankfind.jflamb.com/health

jobs:
  deploy:
    name: Deploy production
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'workflow_run' &&
        github.event.workflow_run.conclusion == 'success'
      )
    runs-on: ubuntu-latest
    environment:
      name: production
      url: ${{ env.PUBLIC_MCP_URL }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Validate required variables
        run: |
          required=(
            GCP_PROJECT_ID
            GCP_REGION
            GAR_REPOSITORY
            GAR_IMAGE
            CLOUD_RUN_SERVICE
            GCP_WORKLOAD_IDENTITY_PROVIDER
            GCP_SERVICE_ACCOUNT
            CLOUD_RUN_RUNTIME_SERVICE_ACCOUNT
          )
          for name in "${required[@]}"; do
            if [ -z "${!name}" ]; then
              echo "Missing required GitHub Actions variable: $name"
              exit 1
            fi
          done

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.GCP_SERVICE_ACCOUNT }}
          token_format: access_token

      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GCP_REGION }}-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Derive image URI
        id: image
        run: |
          IMAGE_URI="${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${GAR_REPOSITORY}/${GAR_IMAGE}:${GITHUB_SHA}"
          echo "uri=${IMAGE_URI}" >> "$GITHUB_OUTPUT"

      - name: Build and push container image
        run: |
          docker build -t "${{ steps.image.outputs.uri }}" .
          docker push "${{ steps.image.outputs.uri }}"

      - name: Deploy to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.CLOUD_RUN_SERVICE }}
          region: ${{ env.GCP_REGION }}
          project_id: ${{ env.GCP_PROJECT_ID }}
          image: ${{ steps.image.outputs.uri }}
          env_vars: |-
            HOST=0.0.0.0
          flags: >-
            --allow-unauthenticated
            --port=8080
            --service-account=${{ env.CLOUD_RUN_RUNTIME_SERVICE_ACCOUNT }}

      - name: Run post-deploy smoke checks
        run: |
          set -euo pipefail

          health_response="$(mktemp)"
          mcp_response="$(mktemp)"
          trap 'rm -f "$health_response" "$mcp_response"' EXIT

          curl --fail --silent --show-error \
            "$PUBLIC_HEALTH_URL" \
            --output "$health_response"

          python3 - "$health_response" <<'PY'
          import json
          import pathlib
          import sys

          payload = json.loads(pathlib.Path(sys.argv[1]).read_text())

          assert payload["status"] == "ok", payload
          assert payload["server"] == "fdic-mcp-server", payload
          assert isinstance(payload["version"], str) and payload["version"], payload
          PY

          curl --fail --silent --show-error \
            "$PUBLIC_MCP_URL" \
            -H 'content-type: application/json' \
            -H 'accept: application/json, text/event-stream' \
            -d '{"jsonrpc":"2.0","id":1,"method":"tools/list","params":{}}' \
            --output "$mcp_response"

          python3 - "$mcp_response" <<'PY'
          import json
          import pathlib
          import sys

          payload = json.loads(pathlib.Path(sys.argv[1]).read_text())
          result = payload["result"]
          tools = result["tools"]

          assert payload["jsonrpc"] == "2.0", payload
          assert payload["id"] == 1, payload
          assert isinstance(tools, list) and tools, payload
          assert any(tool.get("name") == "fdic_search_institutions" for tool in tools), payload
          PY

      - name: Show deployed URL
        run: |
          echo "Cloud Run service URL: ${{ steps.deploy.outputs.url }}"
          echo "Public MCP URL: ${{ env.PUBLIC_MCP_URL }}"
