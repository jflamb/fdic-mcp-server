name: Deploy Cloud Run

on:
  workflow_run:
    # Chain off Release rather than CI so the new git tag exists before the
    # Docker image is built. Release runs after CI on main and exits 0 even
    # when no releasable commits are present, so non-releasing pushes still
    # trigger a deploy.
    workflows:
      - Release
    types:
      - completed
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-cloud-run-production
  cancel-in-progress: false

env:
  GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  GCP_REGION: ${{ vars.GCP_REGION }}
  GAR_REPOSITORY: ${{ vars.GAR_REPOSITORY }}
  GAR_IMAGE: ${{ vars.GAR_IMAGE }}
  CLOUD_RUN_SERVICE: ${{ vars.CLOUD_RUN_SERVICE }}
  GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
  GCP_SERVICE_ACCOUNT: ${{ vars.GCP_SERVICE_ACCOUNT }}
  CLOUD_RUN_RUNTIME_SERVICE_ACCOUNT: ${{ vars.CLOUD_RUN_RUNTIME_SERVICE_ACCOUNT }}
  PUBLIC_MCP_URL: https://bankfind.jflamb.com/mcp
  PUBLIC_HEALTH_URL: https://bankfind.jflamb.com/health
  PUBLIC_CHAT_STATUS_URL: https://bankfind.jflamb.com/chat/status
  CHAT_ALLOWED_ORIGIN: https://jflamb.github.io

jobs:
  deploy:
    name: Deploy production
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'workflow_run' &&
        github.event.workflow_run.conclusion == 'success'
      )
    runs-on: ubuntu-latest
    environment:
      name: production
      url: ${{ env.PUBLIC_MCP_URL }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
          fetch-depth: 0
          fetch-tags: true

      - name: Resolve published version
        id: version
        run: |
          # Use the latest annotated tag if present (semantic-release creates
          # one in the preceding Release run). Strip the leading "v" so the
          # value matches the npm-published version. Fall back to the
          # committed package.json version if no tags exist yet (e.g. first
          # ever deploy).
          if VERSION="$(git describe --tags --abbrev=0 2>/dev/null)"; then
            VERSION="${VERSION#v}"
          else
            VERSION="$(node -p 'require("./package.json").version')"
          fi
          echo "value=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Resolved deploy version: ${VERSION}"

      - name: Validate required variables
        run: |
          required=(
            GCP_PROJECT_ID
            GCP_REGION
            GAR_REPOSITORY
            GAR_IMAGE
            CLOUD_RUN_SERVICE
            GCP_WORKLOAD_IDENTITY_PROVIDER
            GCP_SERVICE_ACCOUNT
            CLOUD_RUN_RUNTIME_SERVICE_ACCOUNT
          )
          for name in "${required[@]}"; do
            if [ -z "${!name}" ]; then
              echo "Missing required GitHub Actions variable: $name"
              exit 1
            fi
          done

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.GCP_SERVICE_ACCOUNT }}
          token_format: access_token

      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GCP_REGION }}-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Derive image URI
        id: image
        run: |
          IMAGE_URI="${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${GAR_REPOSITORY}/${GAR_IMAGE}:${GITHUB_SHA}"
          echo "uri=${IMAGE_URI}" >> "$GITHUB_OUTPUT"

      - name: Build and push container image
        run: |
          docker build \
            --build-arg VERSION="${{ steps.version.outputs.value }}" \
            -t "${{ steps.image.outputs.uri }}" \
            .
          docker push "${{ steps.image.outputs.uri }}"

      - name: Deploy to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.CLOUD_RUN_SERVICE }}
          region: ${{ env.GCP_REGION }}
          project_id: ${{ env.GCP_PROJECT_ID }}
          image: ${{ steps.image.outputs.uri }}
          env_vars: |-
            HOST=0.0.0.0
            CHAT_ALLOWED_ORIGINS=${{ env.CHAT_ALLOWED_ORIGIN }}
          secrets: |-
            GEMINI_API_KEY=gemini-api-key:latest
          flags: >-
            --allow-unauthenticated
            --port=8080
            --service-account=${{ env.CLOUD_RUN_RUNTIME_SERVICE_ACCOUNT }}

      - name: Run post-deploy smoke checks
        env:
          EXPECTED_VERSION: ${{ steps.version.outputs.value }}
        run: |
          set -euo pipefail

          health_response="$(mktemp)"
          chat_status_response="$(mktemp)"
          init_headers="$(mktemp)"
          init_response="$(mktemp)"
          initialized_response="$(mktemp)"
          mcp_response="$(mktemp)"
          trap 'rm -f "$health_response" "$chat_status_response" "$init_headers" "$init_response" "$initialized_response" "$mcp_response"' EXIT

          # Cloud Run flips traffic to the new revision once deploy-cloudrun
          # returns, but allow a brief retry so transient routing or warmup
          # blips don't fail the deploy.
          for attempt in 1 2 3 4 5; do
            if curl --fail --silent --show-error \
              "$PUBLIC_HEALTH_URL" \
              --output "$health_response"; then
              break
            fi
            echo "health check attempt ${attempt} failed; retrying in 3s"
            sleep 3
          done

          python3 - "$health_response" "$EXPECTED_VERSION" <<'PY'
          import json
          import pathlib
          import sys

          payload = json.loads(pathlib.Path(sys.argv[1]).read_text())
          expected_version = sys.argv[2]

          assert payload["status"] == "ok", payload
          assert payload["server"] == "fdic-mcp-server", payload
          assert isinstance(payload["version"], str) and payload["version"], payload
          assert payload["version"] == expected_version, (
              "Deployed /health version "
              f"{payload['version']!r} does not match the resolved deploy "
              f"version {expected_version!r}. The Docker build did not pick "
              "up the VERSION build-arg or Cloud Run is still serving an "
              "older revision."
          )
          PY

          curl --fail --silent --show-error \
            "$PUBLIC_CHAT_STATUS_URL" \
            -H "Origin: $CHAT_ALLOWED_ORIGIN" \
            --output "$chat_status_response"

          python3 - "$chat_status_response" <<'PY'
          import json
          import pathlib
          import sys

          payload = json.loads(pathlib.Path(sys.argv[1]).read_text())

          assert "available" in payload, payload
          assert isinstance(payload["available"], bool), payload
          PY

          curl --fail --silent --show-error \
            "$PUBLIC_MCP_URL" \
            -H 'content-type: application/json' \
            -H 'accept: application/json, text/event-stream' \
            -D "$init_headers" \
            -d '{"jsonrpc":"2.0","id":0,"method":"initialize","params":{"protocolVersion":"2025-03-26","capabilities":{},"clientInfo":{"name":"github-actions-smoke-test","version":"1.0.0"}}}' \
            --output "$init_response"

          session_id="$(python3 - "$init_headers" "$init_response" <<'PY'
          import json
          import pathlib
          import sys

          headers = pathlib.Path(sys.argv[1]).read_text().splitlines()
          payload = json.loads(pathlib.Path(sys.argv[2]).read_text())

          session_id = None
          for header in headers:
            name, sep, value = header.partition(":")
            if sep and name.lower() == "mcp-session-id":
              session_id = value.strip()
              break

          assert session_id, headers
          assert payload["jsonrpc"] == "2.0", payload
          assert payload["id"] == 0, payload
          print(session_id)
          PY
          )"

          curl --fail --silent --show-error \
            "$PUBLIC_MCP_URL" \
            -H 'content-type: application/json' \
            -H 'accept: application/json, text/event-stream' \
            -H "mcp-session-id: $session_id" \
            -d '{"jsonrpc":"2.0","method":"notifications/initialized"}' \
            --output "$initialized_response"

          curl --fail --silent --show-error \
            "$PUBLIC_MCP_URL" \
            -H 'content-type: application/json' \
            -H 'accept: application/json, text/event-stream' \
            -H "mcp-session-id: $session_id" \
            -d '{"jsonrpc":"2.0","id":1,"method":"tools/list","params":{}}' \
            --output "$mcp_response"

          python3 - "$initialized_response" "$mcp_response" <<'PY'
          import json
          import pathlib
          import sys

          initialized_payload = pathlib.Path(sys.argv[1]).read_text().strip()
          payload = json.loads(pathlib.Path(sys.argv[2]).read_text())
          result = payload["result"]
          tools = result["tools"]

          assert initialized_payload == "", initialized_payload
          assert payload["jsonrpc"] == "2.0", payload
          assert payload["id"] == 1, payload
          assert isinstance(tools, list) and tools, payload
          assert any(tool.get("name") == "fdic_search_institutions" for tool in tools), payload
          PY

          # --- Real FDIC-backed tool call: verify end-to-end upstream integration ---
          tool_call_response="$(mktemp)"
          trap 'rm -f "$health_response" "$chat_status_response" "$init_headers" "$init_response" "$initialized_response" "$mcp_response" "$tool_call_response"' EXIT

          curl --fail --silent --show-error \
            "$PUBLIC_MCP_URL" \
            -H 'content-type: application/json' \
            -H 'accept: application/json, text/event-stream' \
            -H "mcp-session-id: $session_id" \
            -d '{"jsonrpc":"2.0","id":2,"method":"tools/call","params":{"name":"fdic_search_institutions","arguments":{"filters":"CERT:3511","fields":"CERT,NAME,STALP","limit":1}}}' \
            --output "$tool_call_response"

          python3 - "$tool_call_response" <<'PY'
          import json
          import pathlib
          import sys

          payload = json.loads(pathlib.Path(sys.argv[1]).read_text())

          assert payload["jsonrpc"] == "2.0", payload
          assert payload["id"] == 2, payload
          assert "error" not in payload, f"Tool call returned error: {payload}"

          result = payload["result"]
          content = result["content"]
          assert isinstance(content, list) and len(content) > 0, "Empty tool content"
          text_items = [c for c in content if c.get("type") == "text"]
          assert text_items, "No text content in tool response"
          assert isinstance(text_items[0].get("text"), str) and text_items[0]["text"], payload

          data = result["structuredContent"]
          assert isinstance(data, dict), f"Missing structuredContent object: {result}"
          assert "institutions" in data, f"Missing institutions key: {list(data.keys())}"
          assert len(data["institutions"]) == 1, f"Expected 1 institution, got {len(data['institutions'])}"

          record = data["institutions"][0]
          assert record["CERT"] == 3511, f"Wrong CERT: {record.get('CERT')}"
          assert isinstance(record["NAME"], str) and record["NAME"], "Missing NAME"
          assert isinstance(record["STALP"], str) and record["STALP"], "Missing STALP"
          PY

      - name: Show deployed URL
        run: |
          echo "Cloud Run service URL: ${{ steps.deploy.outputs.url }}"
          echo "Public MCP URL: ${{ env.PUBLIC_MCP_URL }}"
