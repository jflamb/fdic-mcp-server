name: Live FDIC Smoke Tests

on:
  schedule:
    # Nightly at 07:43 UTC (off-peak, non-round minute)
    - cron: "43 7 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  live-smoke:
    name: Live FDIC API smoke tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build server
        run: npm run build

      - name: Run live smoke tests
        id: smoke
        run: |
          # Run with verbose reporter for CI and capture JSON output for diagnostics
          npx vitest run --config vitest.live.config.ts \
            --reporter=verbose \
            --reporter=json --outputFile=/tmp/live-smoke-results.json \
            2>&1 | tee /tmp/live-smoke-output.txt
        continue-on-error: true

      - name: Generate job summary
        if: always()
        run: |
          {
            echo "## Live FDIC Smoke Test Results"
            echo ""

            if [ "${{ steps.smoke.outcome }}" = "success" ]; then
              echo "**Status:** All tests passed"
              echo ""
            else
              echo "**Status:** One or more tests failed"
              echo ""

              # Extract failure details from JSON output if available
              if [ -f /tmp/live-smoke-results.json ]; then
                echo "### Failed tests"
                echo ""

                # List each failed test with its error message
                node -e "
                  const r = require('/tmp/live-smoke-results.json');
                  const failed = (r.testResults || [])
                    .flatMap(f => (f.assertionResults || []).filter(a => a.status === 'failed'))
                    .map(a => ({
                      name: a.ancestorTitles.concat(a.title).join(' > '),
                      message: (a.failureMessages || []).join('\n').slice(0, 500),
                    }));

                  if (failed.length === 0) {
                    console.log('No individual assertion failures extracted.');
                  } else {
                    for (const f of failed) {
                      console.log('#### \`' + f.name + '\`\n');
                      console.log('\`\`\`');
                      console.log(f.message);
                      console.log('\`\`\`\n');
                    }
                  }
                " 2>/dev/null || true
              fi

              echo "### Triage guide"
              echo ""
              echo "| Failure pattern | Likely layer | Next step |"
              echo "|----------------|-------------|-----------|"
              echo "| All upstream tests fail, MCP tests fail | FDIC API outage or rate limit | Re-run after 1 hour; check [FDIC status](https://api.fdic.gov) |"
              echo "| Upstream tests pass, MCP tests fail | Server integration bug | Reproduce locally: \`npm run build && npm run test:live\` |"
              echo "| One endpoint fails, others pass | Endpoint-specific FDIC issue | Check if the endpoint responds at \`api.fdic.gov\` directly |"
              echo "| structuredContent shape changed | Contract drift | Compare expected fields in test with tool output |"
              echo "| Timeout / ECONNREFUSED | Network / infra issue | Transient — re-run workflow manually |"
              echo ""
              echo "**Reproduce locally:**"
              echo "\`\`\`bash"
              echo "npm run build && npm run test:live"
              echo "\`\`\`"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

          # Compact pass/fail counts
          if [ -f /tmp/live-smoke-results.json ]; then
            node -e "
              const r = require('/tmp/live-smoke-results.json');
              const passed = r.numPassedTests || 0;
              const failed = r.numFailedTests || 0;
              const total = r.numTotalTests || 0;
              const duration = ((r.testResults || []).reduce((s, t) => s + (t.endTime - t.startTime), 0) / 1000).toFixed(1);
              console.log('\n---\n');
              console.log('| Metric | Value |');
              console.log('|--------|-------|');
              console.log('| Total tests | ' + total + ' |');
              console.log('| Passed | ' + passed + ' |');
              console.log('| Failed | ' + failed + ' |');
              console.log('| Duration | ' + duration + 's |');
            " >> "$GITHUB_STEP_SUMMARY" 2>/dev/null || true
          fi

      - name: Upload test output on failure
        if: steps.smoke.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: live-smoke-output-${{ github.run_id }}
          path: |
            /tmp/live-smoke-output.txt
            /tmp/live-smoke-results.json
          retention-days: 14

      - name: Fail if tests failed
        if: steps.smoke.outcome == 'failure'
        run: |
          echo "::error::Live FDIC smoke tests failed. See job summary for triage guidance."
          exit 1
