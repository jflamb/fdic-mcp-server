name: Live FDIC Smoke Tests

on:
  schedule:
    # Nightly at 07:43 UTC (off-peak, non-round minute)
    - cron: "43 7 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  live-smoke:
    name: Live FDIC API smoke tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build server
        run: npm run build

      - name: Run live smoke tests
        run: npm run test:live
