name: FDIC Schema Drift Check

on:
  schedule:
    # Weekly on Monday at 06:17 UTC (off-peak, non-round minute)
    - cron: "17 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  check-drift:
    name: Check FDIC endpoint metadata drift
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Snapshot committed metadata
        run: cp src/fdicEndpointMetadata.ts /tmp/fdicEndpointMetadata.committed.ts

      - name: Regenerate metadata from FDIC upstream
        run: npm run fdic-schema:sync

      - name: Compare committed vs regenerated
        id: diff
        run: |
          if diff -u /tmp/fdicEndpointMetadata.committed.ts src/fdicEndpointMetadata.ts > /tmp/metadata-diff.txt 2>&1; then
            echo "drift=false" >> "$GITHUB_OUTPUT"
            echo "No schema drift detected."
          else
            echo "drift=true" >> "$GITHUB_OUTPUT"
            echo "Schema drift detected. Diff:"
            cat /tmp/metadata-diff.txt
          fi

      - name: Upload diff artifact
        if: steps.diff.outputs.drift == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: fdic-schema-drift-diff
          path: /tmp/metadata-diff.txt
          retention-days: 30

      - name: Open drift issue
        if: steps.diff.outputs.drift == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const diff = fs.readFileSync('/tmp/metadata-diff.txt', 'utf8');

            // Truncate diff for issue body if very large
            const maxLen = 60000;
            const truncated = diff.length > maxLen
              ? diff.slice(0, maxLen) + '\n\n... (truncated, see workflow artifact for full diff)'
              : diff;

            const title = `FDIC upstream schema drift detected (${new Date().toISOString().slice(0, 10)})`;

            // Check for an existing open issue to avoid duplicates
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'fdic-schema-drift',
              per_page: 1,
            });

            if (existing.data.length > 0) {
              // Comment on existing issue instead of opening a new one
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.data[0].number,
                body: `Schema drift still present as of ${new Date().toISOString().slice(0, 10)}.\n\n<details><summary>Diff</summary>\n\n\`\`\`diff\n${truncated}\n\`\`\`\n\n</details>`,
              });
              console.log(`Commented on existing issue #${existing.data[0].number}`);
              return;
            }

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              labels: ['fdic-schema-drift'],
              body: [
                '## FDIC Upstream Schema Drift Detected',
                '',
                'The FDIC API documentation has changed in a way that affects the generated endpoint metadata.',
                'This may indicate added, removed, or renamed fields that could affect tool behavior.',
                '',
                '### What to do',
                '',
                '1. Run `npm run fdic-schema:sync` locally to regenerate the metadata.',
                '2. Review the diff for impact on tool schemas, field references, and test expectations.',
                '3. If the changes are benign, commit the updated metadata.',
                '4. If the changes break tool contracts, coordinate a migration.',
                '',
                '### Diff',
                '',
                '<details><summary>Show diff</summary>',
                '',
                '```diff',
                truncated,
                '```',
                '',
                '</details>',
              ].join('\n'),
            });
            console.log('Opened new schema drift issue.');

      - name: Fail workflow on drift
        if: steps.diff.outputs.drift == 'true'
        run: |
          echo "::error::FDIC upstream schema drift detected. See diff artifact and issue."
          exit 1
