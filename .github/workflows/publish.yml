name: Publish npm and Registry

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  id-token: write
  contents: write
  packages: write

concurrency:
  group: publish-npm-and-registry-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish release artifacts
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Ensure release tag points to main
        if: github.event_name == 'push'
        run: |
          git fetch origin main --depth=1
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "Release tags must reference a commit already on main."
            exit 1
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate release
        run: npm run prepublishOnly

      - name: Check for existing npm version
        id: npm_version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if npm view "fdic-mcp-server@${VERSION}" version >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm
        if: steps.npm_version.outputs.exists != 'true'
        run: npm publish

      - name: Install MCP Registry publisher
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher

      - name: Authenticate to MCP Registry
        if: startsWith(github.ref, 'refs/tags/v')
        run: ./mcp-publisher login github-oidc

      - name: Sync server.json version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          node scripts/sync-server-json.mjs "${VERSION}"

      - name: Publish to official MCP Registry
        if: startsWith(github.ref, 'refs/tags/v')
        run: ./mcp-publisher publish

      - name: Prepare GitHub Packages bundle
        run: node scripts/prepare-gpr-package.mjs

      - name: Set up Node.js for GitHub Packages
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: https://npm.pkg.github.com
          scope: "@jflamb"

      - name: Check for existing GitHub Packages version
        id: gpr
        working-directory: .tmp/github-package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if npm view @jflamb/fdic-mcp-server@"$VERSION" version --registry=https://npm.pkg.github.com >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to GitHub Packages
        if: steps.gpr.outputs.exists != 'true'
        working-directory: .tmp/github-package
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NOTES_FILE=".github/release-notes/${GITHUB_REF_NAME}.md"
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            if [ -f "$NOTES_FILE" ]; then
              gh release edit "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --notes-file "$NOTES_FILE"
            else
              gh release edit "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --generate-notes
            fi
          else
            if [ -f "$NOTES_FILE" ]; then
              gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --notes-file "$NOTES_FILE"
            else
              gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --generate-notes
            fi
          fi
