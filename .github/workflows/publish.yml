name: Release

on:
  workflow_dispatch:
  workflow_run:
    workflows:
      - CI
    types:
      - completed

permissions:
  id-token: write
  contents: write
  packages: write

concurrency:
  group: release-${{ github.event.workflow_run.head_branch || github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish release artifacts
    if: >
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'workflow_run' &&
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.head_branch == 'main' &&
        !contains(github.event.workflow_run.head_commit.message, '[skip release]')
      )
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: main

      - name: Ensure release target is the latest validated main commit
        id: release_target
        if: github.event_name == 'workflow_run'
        run: |
          LATEST_MAIN_SHA="$(git rev-parse HEAD)"
          VALIDATED_SHA="${{ github.event.workflow_run.head_sha }}"

          if [ "$LATEST_MAIN_SHA" != "$VALIDATED_SHA" ]; then
            echo "Skipping release because main advanced after the validated CI run."
            echo "Latest main: $LATEST_MAIN_SHA"
            echo "Validated:   $VALIDATED_SHA"
            echo "current=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "current=true" >> "$GITHUB_OUTPUT"

      - name: Configure Git author
        if: github.event_name != 'workflow_run' || steps.release_target.outputs.current == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Set up Node.js for release
        if: github.event_name != 'workflow_run' || steps.release_target.outputs.current == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install dependencies
        if: github.event_name != 'workflow_run' || steps.release_target.outputs.current == 'true'
        run: npm ci

      - name: Validate release inputs
        if: github.event_name == 'workflow_dispatch'
        run: npm run prepublishOnly

      - name: Run semantic-release
        id: semantic
        if: github.event_name != 'workflow_run' || steps.release_target.outputs.current == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: node scripts/run-semantic-release.mjs

      - name: Install MCP Registry publisher
        if: steps.semantic.outputs.new_release_published == 'true'
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher

      - name: Authenticate to MCP Registry
        if: steps.semantic.outputs.new_release_published == 'true'
        run: ./mcp-publisher login github-oidc

      - name: Publish to official MCP Registry
        if: steps.semantic.outputs.new_release_published == 'true'
        run: ./mcp-publisher publish

      - name: Prepare GitHub Packages bundle
        if: steps.semantic.outputs.new_release_published == 'true'
        run: node scripts/prepare-gpr-package.mjs

      - name: Set up Node.js for GitHub Packages
        if: steps.semantic.outputs.new_release_published == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          registry-url: https://npm.pkg.github.com
          scope: "@jflamb"

      - name: Check for existing GitHub Packages version
        if: steps.semantic.outputs.new_release_published == 'true'
        id: gpr
        working-directory: .tmp/github-package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if npm view @jflamb/fdic-mcp-server@"$VERSION" version --registry=https://npm.pkg.github.com >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to GitHub Packages
        if: steps.semantic.outputs.new_release_published == 'true' && steps.gpr.outputs.exists != 'true'
        working-directory: .tmp/github-package
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summarize release result
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ] && [ "${{ steps.release_target.outputs.current }}" = "false" ]; then
            echo "Skipped release because a newer main commit is already present."
          elif [ "${{ steps.semantic.outputs.new_release_published }}" = "true" ]; then
            echo "Published release v${{ steps.semantic.outputs.new_release_version }}."
          else
            echo "No releasable conventional commits were found."
          fi
